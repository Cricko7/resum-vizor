version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: resume-vizor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_vizor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_vizor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: resume-vizor-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-vizor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      APP_BASE_URL: http://localhost:8080
      RUST_LOG: info,tower_http=info
      REQUEST_CACHE_TTL_SECONDS: 60
      HR_API_RATE_LIMIT_REQUESTS: 60
      HR_API_RATE_LIMIT_WINDOW_SECONDS: 60
      INTEGRATION_API_KEY_BURST_WINDOW_SECONDS: 10
      INTEGRATION_API_KEY_ATS_ONLY_BURST_LIMIT: 30
      INTEGRATION_API_KEY_HR_AUTOMATION_ONLY_BURST_LIMIT: 20
      INTEGRATION_API_KEY_COMBINED_BURST_LIMIT: 40
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/resume_vizor
      DATABASE_MAX_CONNECTIONS: 10
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_PREFIX: resume_vizor:hr_rate_limit
      REDIS_CACHE_PREFIX: resume_vizor:request_cache
      DIPLOMA_HASH_KEY: replace-with-a-long-random-secret
      JWT_SECRET: replace-with-another-long-random-secret
      ATS_API_KEY_SECRET: replace-with-ats-api-key-secret
      JWT_TTL_MINUTES: 60
      UNIVERSITY_SIGNING_KEY: replace-with-signing-secret
      DIPLOMA_LINK_TTL_MINUTES: 30

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: resume-vizor-prometheus
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: resume-vizor-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  grafana_data:
