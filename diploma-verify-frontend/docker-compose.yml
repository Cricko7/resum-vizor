version: '3.8'

services:
  frontend:
    build: .
    container_name: diploma-verify-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - default

# Если нужно подключиться к сети бэкенда
networks:
  default:
    name: resume-vizor-network
    external: true